{
  "version": "v1",
  "updated_at": "2026-04-07",
  "scope": "wireless_earbuds_text_first",
  "rules": {
    "discovery_required_slots": [
      "use_case",
      "budget_tier",
      "priority"
    ],
    "close_readiness": {
      "min_discovery_confidence": 0.7,
      "allow_if_unresolved_objection": false
    },
    "objection_handlers": {
      "price": "value_plus_lower_tier",
      "authenticity": "trust_first",
      "time": "compress_response",
      "returns": "risk_reduction",
      "brand_loyalty": "recommend_with_tradeoff"
    },
    "objection_priority": [
      "authenticity",
      "returns",
      "price",
      "time",
      "brand_loyalty"
    ],
    "ranking_weights": {
      "budget_match": 4,
      "lower_tier_bonus": 1,
      "over_budget_penalty": 2,
      "priority_match": 3,
      "use_case_match": 2,
      "device_match": 1
    },
    "response_limits": {
      "max_bullets": 3,
      "max_words_soft": 80
    },
    "trust_handling": {
      "always_include_if_unresolved": true
    }
  }
}